<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge of Persistence</title>
  <!-- GSAP Animation Library -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
  <img src="assets/Infineo-logo.webp" alt="logo" class="company-logo" />
  <!-- SCREEN 1 - WELCOME -->
  <section id="welcome-screen" class="screen active">
    <div class="welcome-content">
      <img src="assets/title.png" alt="title">
      <button id="start-btn" class="main-btn">
        START GAME
      </button>
    </div>
  </section>

  <!-- SCREEN 2 - GAME -->
  <section id="game-screen" class="screen">
    <!-- Drifting sky clouds -->
    <div class="sky-cloud"></div>
    <div class="sky-cloud"></div>
    <div class="sky-cloud"></div>
    <div class="sky-cloud"></div>
    <div class="sky-cloud"></div>
    <div id="instruction-popup" class="popup active-popup">
      <h2>How To Play</h2>
      <p>
        Mean comments create gaps in the path.
      </p>
      <p>
        Choose the best action
        to help the boy move forward.

        Only patience builds the bridge.
        Wrong choices may break it.
      </p>
      <button id="play-btn" class="main-btn">
        LET'S GO
      </button>
    </div>
    <div class="top-ui">
      <div class="progress-wrapper">
        <span class="progress-label">
          Bridge Progress
        </span>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="comment-cloud" id="mean-comment">
      "Go Away!"
    </div>

    <div class="game-area">
      <!-- Character -->
      <div id="character">
        <img src="../assets/boy.webp" alt="boy" />
      </div>
      <!-- Bridge -->
      <div class="bridge-container">
        <div id="bridge">
          <!-- bricks added dynamically -->
        </div>
      </div>
      <!-- House -->
      <div class="house">
        <img src="/assets/hut.webp" alt="house">
      </div>
    </div>
    <div class="brick-slots">
      <div class="brick-slot"></div>
      <div class="brick-slot"></div>
      <div class="brick-slot"></div>
      <div class="brick-slot"></div>
      <div class="brick-slot"></div>
      <div class="brick-slot"></div>
      <div class="brick-slot"></div>
    </div>

    </div>
    <div class="brick-tray" id="brick-tray">
  <!-- Bricks generated dynamically -->
</div>


    <!-- ACTION BUTTON -->
    <div class="action-buttons">
      <button id="patient-btn" class="main-btn good-btn">
        😊 STAY PATIENT
      </button>

      <button id="angry-btn" class="main-btn bad-btn">
        😠 GET ANGRY
      </button>

      <button id="giveup-btn" class="main-btn bad-btn">
        🙁 GIVE UP
      </button>
    </div>
  </section>
  <!-- SCREEN 3 - SUCCESS -->
  <section id="success-screen" class="screen">
    <div class="success-content">
      <h1>Persistence Builds Bridges</h1>
    </div>
  </section>

  <script src="js/script.js"></script>

</body>

</html>
