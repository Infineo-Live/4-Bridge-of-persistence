<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge of Persistence</title>
  <!-- GSAP Animation -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
  <canvas id="firefly-canvas" class="firefly-canvas"></canvas>
  <img src="assets/Infineo-logo.webp" alt="logo" class="company-logo" />
  <div id="game-wrapper">
    <div id="game-container">
      <div id="game-viewport">
        <!-- SCREEN 1 - WELCOME -->
        <section id="welcome-screen" class="screen active">
          <div class="welcome-content">
            <img src="assets/title.webp" alt="title" class="welcome-title">
            <button id="start-btn" class="welcome-start-btn">
              <img src="assets/start-btn.webp" alt="START GAME">
            </button>
          </div>
        </section>

        <!-- SCREEN 2 - GAME -->
        <section id="game-screen" class="screen">
          <!-- HOW TO PLAY POPUP -->
          <div>
            <div id="instruction-popup" class="popup active-popup">
              <img src="assets/instruction-title.webp" alt="instructions" class="popup-title">

              <button id="play-btn" class="game-continue-btn">
                <img src="assets/continue-btn.webp" alt="LET'S GO">
              </button>
            </div>
          </div>

          <!-- TOP UI -->
          <div id="game-content" class="hidden-game">
            <div class="top-ui">
              <div class="progress-wrapper">
                <span class="progress-label">
                  Bridge of Persistence
                </span>

                <div class="progress-bar">
                  <div id="progress-fill"></div>
                </div>
              </div>
            </div>

            <!-- ENCOUNTER AREA -->
            <div class="encounter-area">
              <div id="speech-bubble" class="speech-bubble">
                <span id="mean-comment"></span>
              </div>

              <!-- Villager -->
              <div id="villager" class="villager-container">
                <img id="villager-img" src="assets/Characters/oldman.webp" alt="villager" />
              </div>

            </div>

            <!-- GAME AREA -->
            <div class="game-area">

              <!-- Character -->
              <div id="character">
                <img id="boy-img" src="assets/boy.webp" alt="boy" />
              </div>

              <!-- Bridge -->
              <div class="bridge-container">
                <div id="bridge">

                  <!-- PRE-RENDERED SLOTS -->
                  <div class="brick-slot"></div>
                  <div class="brick-slot"></div>
                  <div class="brick-slot"></div>
                  <div class="brick-slot"></div>
                  <div class="brick-slot"></div>
                  <div class="brick-slot"></div>
                  <div class="brick-slot"></div>

                </div>
              </div>

              <!-- Destination -->
              <div class="house">
                <img src="assets/hut.webp" alt="home" />
              </div>

            </div>

            <!-- VALUES BRICKS -->
            <div class="brick-tray" id="brick-tray">
              <!-- Generated dynamically -->
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">

              <button id="choice-1-btn" class="main-btn option-btn">
                Option 1
              </button>

              <button id="choice-2-btn" class="main-btn option-btn">
                Option 2
              </button>

              <button id="choice-3-btn" class="main-btn option-btn">
                Option 3
              </button>

            </div>
          </div>
        </section>
        <!-- SCREEN 3 - SUCCESS -->
        <section id="success-screen" class="screen">
          <img src="assets/end-game-title2.webp" alt="" class="end-screen-image">
        </section>
      </div>
    </div>
  </div>
  <!-- AUDIO -->
  <!-- Background Music -->
  <audio id="bg-music" src="assets/audio/bg-audio.mp3" loop></audio>

  <audio id="click-audio" preload="auto">
    <source src="assets/audio/click-sound.mp3" type="audio/mpeg">
  </audio>

  <audio id="correct-audio" preload="auto">
    <source src="assets/audio/correct.mp3" type="audio/mpeg">
  </audio>

  <audio id="wrong-audio" preload="auto">
    <source src="assets/audio/wrong.mp3" type="audio/mpeg">
  </audio>

  <audio id="yay-audio" preload="auto">
    <source src="assets/audio/yayy.mp3" type="audio/mpeg">
  </audio>

  <audio id="wood-audio" preload="auto">
    <source src="assets/audio/wooden-thud.mp3" type="audio/mpeg">
  </audio>
  <script src="js/script.js"></script>
  <script src="js/fireflies.js"></script>


</body>

</html>
