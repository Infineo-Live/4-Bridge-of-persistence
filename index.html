<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge of Persistence</title>
  <!-- GSAP Animation Library -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
  <img src="assets/Infineo-logo.webp" alt="logo" class="company-logo" />
  <!-- SCREEN 1 - WELCOME -->
  <section id="welcome-screen" class="screen active">
    <div class="welcome-content">
      <img src="assets/title.png" alt="title">
      <button id="start-btn" class="main-btn">
        START GAME
      </button>
    </div>
  </section>

  <!-- SCREEN 2 - GAME -->
  <section id="game-screen" class="screen">


    <!-- HOW TO PLAY POPUP -->
    <div id="instruction-popup" class="popup active-popup">
      <h2>How To Play</h2>

      <p>
        Villagers may say negative things to stop the boy.
      </p>

      <p>
        Help him stay positive and keep moving
        toward his dream of making kheer.
      </p>

      <p>
        Every good choice builds part of the bridge.
        Persistence helps us reach our goals!
      </p>

      <button id="play-btn" class="main-btn">
        LET'S GO
      </button>
    </div>

    <!-- TOP UI -->
     <div id="game-content" class="hidden-game">
    <div class="top-ui">
      <div class="progress-wrapper">
        <span class="progress-label">
          Bridge of Persistence
        </span>

        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- ENCOUNTER AREA -->
    <div class="encounter-area">

      <!-- Villager -->
      <div id="villager" class="villager-container">
        <img id="villager-img" src="assets/uncle.png" alt="villager" />
      </div>

      <!-- Speech Bubble -->
      <div id="speech-bubble" class="speech-bubble">
        <span id="mean-comment"></span>
      </div>

    </div>

    <!-- GAME AREA -->
    <div class="game-area">

      <!-- Character -->
      <div id="character">
        <img id="boy-img" src="assets/boy.webp" alt="boy" />
      </div>

      <!-- Bridge -->
      <div class="bridge-container">
        <div id="bridge">

          <!-- PRE-RENDERED SLOTS -->
          <div class="brick-slot"></div>
          <div class="brick-slot"></div>
          <div class="brick-slot"></div>
          <div class="brick-slot"></div>
          <div class="brick-slot"></div>
          <div class="brick-slot"></div>
          <div class="brick-slot"></div>

        </div>
      </div>

      <!-- Destination -->
      <div class="house">
        <img src="assets/hut.webp" alt="home" />
      </div>

    </div>

    <!-- VALUES BRICKS -->
    <div class="brick-tray" id="brick-tray">
      <!-- Generated dynamically -->
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-buttons">

      <button id="choice-1-btn" class="main-btn option-btn">
        Option 1
      </button>

      <button id="choice-2-btn" class="main-btn option-btn">
        Option 2
      </button>

      <button id="choice-3-btn" class="main-btn option-btn">
        Option 3
      </button>

    </div>
    </div>
  </section>
  <!-- SCREEN 3 - SUCCESS -->
  <section id="success-screen" class="screen">
      <img src="assets/end-screen-title2.png" alt="" class="end-screen-image">
  </section>
  <!-- AUDIO -->
  <!-- Background Music -->
  <audio id="bg-music" src="assets/audio/bg-audio.mp3" loop></audio>

  <!-- Button Click -->
  <!-- <audio id="click-sound" src="assets/audio/click.mp3"></audio> -->

  <!-- Correct Choice -->
  <!-- <audio id="correct-sound" src="assets/audio/correct.mp3"></audio> -->

  <!-- Wrong Choice -->
  <!-- <audio id="wrong-sound" src="assets/audio/wrong.mp3"></audio> -->

  <!-- Success Sound -->
  <!-- <audio id="success-sound" src="assets/audio/success.mp3"></audio> -->
  <script src="js/script.js"></script>

</body>

</html>
